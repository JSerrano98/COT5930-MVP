<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ECHO</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        background: #1c1917;
        color: #ffffff;
        font-family: 'Segoe UI', Arial, sans-serif;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
      }

      .title {
        font-family: 'Bebas Neue', Impact, sans-serif;
        font-size: 88px;
        letter-spacing: 0.12em;
        line-height: 1;
        color: #ffffff;
      }

      .divider {
        width: 100%;
        height: 1px;
        background: #292524;
        margin: 8px 0;
      }

      .subtitle {
        font-size: 9.6px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #78716c;
        margin-bottom: 32px;
      }

      .spinner {
        width: 32px; height: 32px;
        border: 2px solid rgba(255, 122, 0, 0.25);
        border-top-color: #FF7A00;
        border-radius: 9999px;
        animation: spin 0.8s linear infinite;
        margin-bottom: 16px;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      .status {
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #57534e;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 class="title">ECHO</h1>
      <div class="divider"></div>
      <p class="subtitle">Enhanced Cognitive Human Operations</p>
      <div class="spinner"></div>
      <p class="status" id="status">Starting…</p>
    </div>

    <script>
      // Listen for status messages from main process if contextBridge exposes them
      if (window.echosplash?.onStatus) {
        window.echosplash.onStatus((msg) => {
          document.getElementById('status').textContent = msg;
        });
      }
    </script>
  </body>
</html>
